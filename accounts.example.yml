# ═══════════════════════════════════════════════════════════
# Pro-Notify — Multi-Account & Bot Configuration
# ═══════════════════════════════════════════════════════════
# Copy this file to accounts.yml and fill in your credentials.
#
# Supports:
#   - Multiple email accounts with per-account keywords
#   - Gold price monitoring with alerts
#   - Weather updates with severe weather warnings
# ═══════════════════════════════════════════════════════════

accounts:
  - name: "Personal Gmail"
    email: "your-email@gmail.com"
    app_password: "xxxx xxxx xxxx xxxx"
    imap_server: "imap.gmail.com"
    imap_port: 993
    keywords:
      - "dmca"
      - "copyright"
      - "invoice"
      - "urgent"
    telegram:
      bot_token: "123456789:ABCDEF..."
      chat_id: "751728238"

  - name: "Work Outlook"
    email: "your-email@outlook.com"
    app_password: "your-app-password"
    imap_server: "outlook.office365.com"
    imap_port: 993
    keywords:
      - "invoice"
      - "payment"
      - "thanh toán"
      - "cảnh báo"
    telegram:
      bot_token: "123456789:ABCDEF..."
      chat_id: "987654321"

  - name: "Google Ads Monitor"
    email: "your-ads-email@gmail.com"
    app_password: "xxxx xxxx xxxx xxxx"
    imap_server: "imap.gmail.com"
    imap_port: 993
    keywords:
      - "advertiser verification"
    sender_filters:                          # Forward ALL emails from these senders
      - "ads-account-noreply@google.com"
    telegram:
      bot_token: "123456789:ABCDEF..."
      chat_id: "751728238"

# ═══════════════════════════════════════════════════════════
# Gold Price Bot
# ═══════════════════════════════════════════════════════════
gold:
  enabled: true
  telegram:
    bot_token: "123456789:ABCDEF..."
    chat_id: "751728238"
  schedule:
    interval: 0                        # 0 = chỉ chạy theo times
    times: ["07:00", "12:00", "18:00"] # Gửi giá vàng lúc 7h, 12h, 18h
  alerts:                              # Cảnh báo khi giá vượt ngưỡng
    SJC:
      above: 95000                     # Cảnh báo khi SJC ≥ 95tr
      below: 85000                     # Cảnh báo khi SJC ≤ 85tr

# ═══════════════════════════════════════════════════════════
# Weather Bot
# ═══════════════════════════════════════════════════════════
weather:
  enabled: true
  api_key: "YOUR_OPENWEATHERMAP_API_KEY"  # Free: https://openweathermap.org/api
  city: "Ho Chi Minh City"
  telegram:
    bot_token: "123456789:ABCDEF..."
    chat_id: "751728238"
  schedule:
    interval: 0
    times: ["06:30", "18:00"]          # Dự báo sáng + chiều
  severe_alert: true                   # Cảnh báo thời tiết xấu (mỗi giờ check)

# ═══════════════════════════════════════════════════════════
# Global settings
# ═══════════════════════════════════════════════════════════
settings:
  poll_interval: 60        # Seconds between email checks
  max_results: 20          # Max emails to fetch per cycle
